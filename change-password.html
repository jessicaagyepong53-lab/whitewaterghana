<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password</title>
<link rel="stylesheet" href="src/script.css?v=20260504">
</head>
<body class="auth-page">
<main class="auth-shell">
  <section class="auth-card">
    <h1>WHITE WATER WELLS LTD</h1>
    <h2>Change Password</h2>
    <p class="muted">Use this page if you know your current password. You will be returned to login after a successful change.</p>

    <section id="reset-password-panel" class="auth-panel">
      <h3>Password Details</h3>
      <p class="muted" style="margin-bottom:10px">You must know your current password to change it.</p>
      <form id="reset-password-form" class="auth-form auth-form-compact">
        <label>Email Address
          <input type="email" name="email" placeholder="Enter your email" required autocomplete="email">
        </label>
        <label>Current Password
          <span class="password-wrap">
            <input type="password" name="currentPassword" placeholder="Enter current password" required autocomplete="current-password">
            <button type="button" class="pwd-toggle" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </span>
        </label>
        <label>New Password
          <span class="password-wrap">
            <input type="password" name="newPassword" placeholder="Enter new password" required autocomplete="new-password">
            <button type="button" class="pwd-toggle" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </span>
        </label>
        <label>Confirm New Password
          <span class="password-wrap">
            <input type="password" name="confirmPassword" placeholder="Confirm new password" required autocomplete="new-password">
            <button type="button" class="pwd-toggle" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
          </span>
        </label>
        <button type="submit">Change Password</button>
      </form>
    </section>

    <p id="auth-message" class="auth-message" aria-live="polite"></p>

    <p class="auth-switch"><a href="login.html">Back to login</a></p>
  </section>
</main>
<script src="src/script.js?v=20260704u"></script>
</body>
</html>
