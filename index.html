<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="src/script.css">
</head>
<body class="auth-page">
<main class="auth-shell">
  <section class="auth-card">
    <h1>WHITE WATER WELLS LTD</h1>
    <h2>Management System - Sign Up</h2>
    <p class="muted">Create your account to access the water factory system.</p>

    <form class="auth-form" action="/pages/dashboard.html" method="get">
      <label>Full Name
        <input type="text" name="full_name" placeholder="Enter your full name" required>
      </label>

      <label>Email Address
        <input type="email" name="email" placeholder="Enter your email" required>
      </label>

      <label>Password
        <input type="password" name="password" placeholder="Create password" required>
      </label>

      <label>Sign Up As
        <select name="role" required>
          <option value="ceo">CEO</option>
          <option value="manager">Manager</option>
          <option value="supervisor">Supervisor</option>
          <option value="employee">Employee</option>
        </select>
      </label>

      <button type="submit">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account sign in <a href="login.html">here</a>.</p>
  </section>
</main>
<script src="src/script.js"></script>
</body>
</html>
