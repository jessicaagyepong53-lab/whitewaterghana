<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="src/script.css?v=20260331">
</head>
<body class="auth-page">
<main class="auth-shell">
  <section class="auth-card">
    <h1>WHITE WATER WELLS LTD</h1>
    <h2>Management System - Sign Up</h2>
    <p class="muted">Create your account to access the water factory system.</p>

    <form class="auth-form" id="register-form">
      <label>Full Name
        <input type="text" name="full_name" placeholder="Enter your full name" required>
      </label>

      <label>Email Address
        <input type="email" name="email" placeholder="Enter your authorized email" required>
      </label>

      <label>Role
        <select name="role" required>
          <option value="" disabled selected>Select your role</option>
          <option value="ceo">CEO</option>
          <option value="manager">Manager</option>
          <option value="supervisor">Supervisor</option>
          <option value="staff">Staff / Employee</option>
        </select>
      </label>

      <label>Password
        <span class="password-wrap">
          <input type="password" name="password" placeholder="Create password (min 6 chars)" required minlength="6">
          <button type="button" class="pwd-toggle" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
        </span>
      </label>

      <label>Confirm Password
        <span class="password-wrap">
          <input type="password" name="confirm_password" placeholder="Confirm password" required minlength="6">
          <button type="button" class="pwd-toggle" aria-label="Show password"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="1" y1="1" x2="23" y2="23"/></svg></button>
        </span>
      </label>

      <button type="submit">Create Account</button>
    </form>

    <p id="auth-message" class="auth-message" aria-live="polite"></p>

    <p class="auth-switch">Already have an account sign in <a href="login.html">here</a>.</p>
  </section>
</main>
<script src="src/script.js?v=20260331"></script>
</body>
</html>
